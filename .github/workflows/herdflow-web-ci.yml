name: HerdFlow Web CI

on:
  push:
    paths:
      - "herdflow-web/**"
      - ".github/workflows/herdflow-web-ci.yml"
  pull_request:
    paths:
      - "herdflow-web/**"
      - ".github/workflows/herdflow-web-ci.yml"
  workflow_dispatch:

concurrency:
  group: herdflow-web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, Build, and Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: herdflow-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: herdflow-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Audit dependencies (high and critical)
        run: npm audit --audit-level=high
