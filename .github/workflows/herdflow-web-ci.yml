name: HerdFlow Web CI

on:
  push:
    paths:
      - "herdflow-web/**"
      - ".github/workflows/herdflow-web-ci.yml"
  pull_request:
    paths:
      - "herdflow-web/**"
      - ".github/workflows/herdflow-web-ci.yml"
  workflow_dispatch:

concurrency:
  group: herdflow-web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, Build, and Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: herdflow-web
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # A throwaway database for this run only, never the real one — needed
      # because /finance, /resources, and /pricing are cached (ISR) pages
      # that Next.js prerenders at build time, which requires a live
      # DATABASE_URL even though the DB just needs to exist, not have data.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: herdflow-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: npx prisma migrate deploy

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Audit dependencies (high and critical)
        run: npm audit --audit-level=high
